services:
  postgres:
    image: postgres:16-alpine
    container_name: seeky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seeky
      POSTGRES_PASSWORD: seeky
      POSTGRES_DB: seeky
    ports:
      - "5432:5432"
    volumes:
      - seeky_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seeky -d seeky"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  seeky_pgdata:
